# ============================================================
# Nginx Reverse Proxy for Odoo Multi-Tenant SaaS Demo
# ============================================================
# This config routes requests based on URL path:
#   http://104.248.42.69/prajatha/ -> odoo-prajatha:8069
#   http://104.248.42.69/farmer/   -> odoo-farmer:8069
#
# HOW IT WORKS:
# - One server block listens on port 80
# - Each location forwards to the correct Odoo container
# - If you prefer, you can also use direct ports 8070 and 8071
# ============================================================

server {
    listen 80 default_server;
    server_name _;

    location /prajatha/ {
        proxy_pass http://odoo-prajatha:8069;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    location /farmer/ {
        proxy_pass http://odoo-farmer:8069;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    location / {
        return 200 'Odoo SaaS Demo is running!\n\nUse one of these URLs:\n- http://104.248.42.69/prajatha/\n- http://104.248.42.69/farmer/\n\nOr use direct ports:\n- http://104.248.42.69:8070 (Prajatha)\n- http://104.248.42.69:8071 (Farmer)\n';
        add_header Content-Type text/plain;
    }
}
