# ============================================================
# Odoo 19 Multi-Tenant SaaS Demo - Docker Compose
# ============================================================
# This file creates 2 Odoo instances
# that connect to PostgreSQL installed on the Ubuntu server host.
#
# Usage:
#   docker compose up -d        (start all)
#   docker compose down          (stop all)
#   docker compose logs -f       (view all logs)
# ============================================================

services:

  # ========== PRAJATHA ==========

  # Prajatha - Odoo Application
  odoo-prajatha:
    image: odoo:17.0                         # Uses odoo:19.0 from .env
    container_name: odoo-prajatha
    extra_hosts:
      - "${PRAJATHA_DB_HOST}:host-gateway"
    environment:
      HOST: ${PRAJATHA_DB_HOST}
      PORT: ${PRAJATHA_DB_PORT}
      USER: ${PRAJATHA_DB_USER}
      PASSWORD: ${PRAJATHA_DB_PASSWORD}
      PGSSLMODE: ${PRAJATHA_DB_SSLMODE}
      PGSSLROOTCERT: /run/certs/do-ca.crt
    ports:
      - "${PRAJATHA_PORT}:8069"                  # Map 8070 -> internal 8069
    volumes:
       - ./prajatha/odoo-prajatha-data:/var/lib/odoo
       - ./prajatha/addons:/mnt/extra-addons
    command:
      - odoo
      - --db_host=${PRAJATHA_DB_HOST}
      - --db_port=${PRAJATHA_DB_PORT}
      - --db_user=${PRAJATHA_DB_USER}
      - --db_password=${PRAJATHA_DB_PASSWORD}
      - --database=${PRAJATHA_DB_NAME}
      - --db-filter=^${PRAJATHA_DB_NAME}$
    restart: unless-stopped
    networks:
      - network-prajatha

  # ========== FARMER ==========

  odoo-farmer:
    image: odoo:19.0
    container_name: odoo-farmer
    extra_hosts:
      - "${FARMER_DB_HOST}:host-gateway"
    environment:
      HOST: ${FARMER_DB_HOST}
      PORT: ${FARMER_DB_PORT}
      USER: ${FARMER_DB_USER}
      PASSWORD: ${FARMER_DB_PASSWORD}
      PGSSLMODE: ${FARMER_DB_SSLMODE}
      PGSSLROOTCERT: /run/certs/do-ca.crt
    ports:
      - "${FARMER_PORT}:8069"
    volumes:
      - odoo-farmer-data:/var/lib/odoo
      - ./farmer/addons:/mnt/extra-addons
    command:
      - odoo
      - --db_host=${FARMER_DB_HOST}
      - --db_port=${FARMER_DB_PORT}
      - --db_user=${FARMER_DB_USER}
      - --db_password=${FARMER_DB_PASSWORD}
      - --database=${FARMER_DB_NAME}
      - --db-filter=^${FARMER_DB_NAME}$
    restart: unless-stopped
    networks:
      - network-farmer

  # ========== NGINX REVERSE PROXY (Optional) ==========
  # Allows access via prajatha.localhost and farmer.localhost.

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - odoo-prajatha
      - odoo-farmer
    restart: unless-stopped
    networks:
      - network-prajatha
      - network-farmer

# ============================================================
# NETWORKS - App traffic only
# ============================================================
networks:
  network-prajatha:
    driver: bridge
  network-farmer:
    driver: bridge

volumes:
  odoo-farmer-data:
